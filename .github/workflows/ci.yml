name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
    
    - name: Setup Node.js 24
      uses: actions/setup-node@v5
      with:
        node-version: 24.x
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci --legacy-peer-deps
    
    - name: Run ESLint
      run: npm run lint

    - name: Check for hardcoded patient IDs
      run: npm run lint:patient-ids
    
    - name: Run accessibility checks
      run: npm run lint:a11y
    
    - name: Run tests
      run: npm test -- --coverage --watchAll=false
    
    - name: Build application
      run: npm run build
      env:
        CI: true
    
    - name: Check build size
      run: |
        echo "Build completed successfully"
        du -sh build/

  documentation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Setup Node.js 24
      uses: actions/setup-node@v5
      with:
        node-version: 24.x
        cache: 'npm'
        cache-dependency-path: docs-site/package-lock.json

    - name: Install documentation dependencies
      run: npm ci --prefix docs-site

    - name: Type-check documentation
      run: npm --prefix docs-site run typecheck

    - name: Build user guide
      run: npm run docs:build

    - name: Upload user guide
      uses: actions/upload-artifact@v6
      with:
        name: deepphe-visualizer-user-guide
        path: site/
