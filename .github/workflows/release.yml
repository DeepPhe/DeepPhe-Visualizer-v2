name: Release

# Builds the self-contained executables and publishes them to
# https://github.com/DeepPhe/DeepPhe-Dist/releases.
#
# Required repository secrets:
#   DEEPPHE_DIST_RELEASE_TOKEN - token with contents:write on DeepPhe/DeepPhe-Dist
#
# Binary signing is disabled for now; this workflow publishes unsigned binaries.
on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  DIST_REPOSITORY: DeepPhe/DeepPhe-Dist
  PACKAGE_NAME: deepphe-visualizer-v2

jobs:
  package:
    name: Package ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Each target is built on a runner whose OS/arch matches it, so pkg
          # never has to cross-fabricate (cross-arch fabrication fails — e.g.
          # macOS arm64 cannot be built on an x64 host).
          - target: node24-macos-arm64
            runner: macos-14       # Apple Silicon
            asset: deepphe-visualizer-v2-macos-arm64
          - target: node24-macos-x64
            runner: macos-15-intel # Intel
            asset: deepphe-visualizer-v2-macos-x64
          - target: node24-linux-x64
            runner: ubuntu-latest
            asset: deepphe-visualizer-v2-linux-x64
          - target: node24-win-x64
            runner: windows-latest
            asset: deepphe-visualizer-v2-win-x64.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build web bundle (same-origin API base)
        run: npm run package:web

      - name: Package executable (${{ matrix.target }})
        run: node scripts/package-pkg.mjs ${{ matrix.target }}

      - name: Generate SHA-256 checksum (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          artifact_path="dist/${{ matrix.asset }}"
          artifact_directory="$(dirname "$artifact_path")"
          artifact_name="$(basename "$artifact_path")"

          if command -v sha256sum > /dev/null 2>&1; then
            (cd "$artifact_directory" && sha256sum "$artifact_name" > "$artifact_name.sha256")
          else
            (cd "$artifact_directory" && shasum -a 256 "$artifact_name" > "$artifact_name.sha256")
          fi

      - name: Generate SHA-256 checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $artifactPath = "dist/${{ matrix.asset }}"
          $artifactName = Split-Path -Leaf $artifactPath
          $hash = (Get-FileHash -Algorithm SHA256 $artifactPath).Hash.ToLowerInvariant()
          "$hash  $artifactName" | Set-Content -Encoding utf8NoBOM -NoNewline "$artifactPath.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.asset }}
          path: |
            dist/${{ matrix.asset }}
            dist/${{ matrix.asset }}.sha256
          if-no-files-found: error

  publish:
    name: Publish DeepPhe-Dist release
    runs-on: ubuntu-latest
    needs: package
    environment: DPHE 7.1
    env:
      GH_TOKEN: ${{ secrets.DEEPPHE_DIST_RELEASE_TOKEN }}
      DPHE_VERSION: ${{ vars.DPHE_VERSION }}

    steps:
      - name: Require DeepPhe-Dist release token
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${GH_TOKEN}" ]]; then
            echo "::error::Missing DEEPPHE_DIST_RELEASE_TOKEN. Add a repository secret with contents:write access to ${DIST_REPOSITORY}."
            exit 1
          fi

      - name: Download packaged binaries
        uses: actions/download-artifact@v7
        with:
          path: dist-release
          merge-multiple: true

      - name: Verify checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist-release
          shopt -s nullglob
          checksums=(*.sha256)
          if [[ "${#checksums[@]}" -eq 0 ]]; then
            echo "::error::No SHA-256 checksums were downloaded."
            exit 1
          fi
          sha256sum --check "${checksums[@]}"

      - name: Write release notes
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "Built from ${GITHUB_REPOSITORY}@${GITHUB_SHA}."
            echo
            echo "- macOS, Windows, and Linux binaries are distributed unsigned with SHA-256 checksums."
            echo "- Source ref: ${GITHUB_REF_NAME}"
            echo "- Source workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "- Distribution repository: ${DIST_REPOSITORY}"
          } > RELEASE_NOTES.md

      - name: Publish release assets
        env:
          DIST_RELEASE_TAG: ${{ env.PACKAGE_NAME }}-${{ env.DPHE_VERSION }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t assets < <(find dist-release -maxdepth 1 -type f | sort)
          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "::error::No packaged binaries were downloaded."
            exit 1
          fi

          edit_flags=(
            --repo "${DIST_REPOSITORY}"
            --title "${PACKAGE_NAME} ${DPHE_VERSION}"
            --notes-file RELEASE_NOTES.md
            --prerelease=false
            --latest
          )
          create_flags=(
            --repo "${DIST_REPOSITORY}"
            --title "${PACKAGE_NAME} ${DPHE_VERSION}"
            --notes-file RELEASE_NOTES.md
            --latest
          )

          if gh release view "${DIST_RELEASE_TAG}" --repo "${DIST_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${DIST_RELEASE_TAG}" "${edit_flags[@]}"
          else
            gh release create "${DIST_RELEASE_TAG}" "${create_flags[@]}"
          fi

          gh release upload "${DIST_RELEASE_TAG}" \
            --repo "${DIST_REPOSITORY}" \
            --clobber \
            "${assets[@]}"
